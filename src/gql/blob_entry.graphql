
fragment entry_fields on BlobEntry {
  id
  blobId
  originId
  label
  blobstore
  hash
  origin
  size
  description
  mimeType
  metadata
  timestamp
  createdTimestamp
  lastUpdatedTimestamp
  _version
  _type
}


query GetBlobEntry(
  $entry_id: ID!
) {
  blobEntries(
    where: {
    	id: $entry_id
  	}
  ) {
    ...entry_fields
  }
}

# BlobEntryCreateInput

mutation AddBlobEntries(
  $entry_id: ID!,
  $entry_label: String!,
  $blob_id: ID!,
  $agent_label: String!,
) {
  addBlobEntries(
    input: {
      id: $entry_id, 
      label: $entry_label, 
      blobId: $blob_id,
      _version: "0.24", 
      parent: {
        Agent: {
          connect: {
            where: {
              node: {
                label: $agent_label
              }
            }
          }
        }
      }
    }
  ) {
    blobEntries {
      timestamp
    }
  }
}