# FIXME LEGACY REMOVE
query GetRobots($userLabel: EmailAddress!)
{
  users (where: {label: $userLabel}) {
    robots {
      label
      createdTimestamp
      sessions {
        label
        createdTimestamp
      }
      blobEntries {
        label
        createdTimestamp
      }
      # metadata
    }
  }
}

query ListRobots($userLabel: String!){
  robots (where: {userLabel: $userLabel}){
    label
  }
} 