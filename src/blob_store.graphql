mutation CompleteUpload($blobId: ID!, $uploadId: ID!, $eTag: String) {
  completeUpload (
    blobId: $blobId,
    completedUpload: {
      uploadId: $uploadId,
      parts: [
        {
          partNumber: 1,
          eTag: $eTag
        }
      ]
    }
  )
}