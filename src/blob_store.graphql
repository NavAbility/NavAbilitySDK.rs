mutation CreateUpload(
  $name: String!, 
  $size: BigInt!, 
  $parts: Int!
) {
  createUpload(
    blob: {
      name: $name,
      size: $size
    },
    parts: $parts
  ) {
    uploadId
    blob {
      id
      name
      size
    }
    parts {
      partNumber
      url
    }
  }
}


mutation CompleteUpload (
  $blobId: ID!, 
  $completedUpload: CompletedUploadInput!
) {
  completeUpload(
    blobId: $blobId, 
    completedUpload: $completedUpload
  )
}



