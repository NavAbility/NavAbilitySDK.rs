

mutation CreateUpload(
  $blobId: ID!, 
  $parts: Int!
) {
  createUpload(
    blobId: $blobId
    parts: $parts
    store: {
      label: "default"
    }
  ) {
    blobId
    parts {
      partNumber
      url
    }
    uploadId
  }
}


mutation CompleteUpload (
  $blobId: ID!, 
  $completedUpload: CompletedUploadInput
) {
  completeUpload(
    blobId: $blobId
    completedUpload: $completedUpload
  )
}

