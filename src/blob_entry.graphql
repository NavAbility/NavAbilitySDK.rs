mutation AddBlobEntries(
  $entry_id: ID!,
  $entry_label: String!,
  $blob_id: ID!,
  $agent_label: String!,
) {
  addBlobEntries(
    input: {
      id: $entry_id, 
      label: $entry_label, 
      blobId: $blob_id,
      _version: "0.24", 
      parent: {
        Agent: {
          connect: {
            where: {
              node: {
                label: $agent_label
              }
            }
          }
        }
      }
    }
  ) {
    blobEntries {
      timestamp
    }
  }
}