
fragment blobEntry_fields on BlobEntry {
  id
  blobId
  originId
  label
  blobstore
  hash
  origin
  description
  mimeType
  metadata
  timestamp
  _type
  _version
}


query GetBlobEntry(
  $entry_id: ID!
) {
  blobEntries(
    where: {
    	id: $entry_id
  	}
  ) {
    ...blobEntry_fields
  }
}

