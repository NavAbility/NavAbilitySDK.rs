
fragment user_fields on User {
  id
  label
  _version
  createdTimestamp
  lastUpdatedTimestamp
}

fragment robot_fields on Robot {
  id
  label
  _version
  createdTimestamp
  lastUpdatedTimestamp
}

fragment session_fields on Session {
  id
  label
  robotLabel
  userLabel
  _version
  createdTimestamp
  lastUpdatedTimestamp
}

query getUser($userLabel: EmailAddress!) {
  users (where: {label: $userLabel}) {
    ...user_fields
    robots {
      ...robot_fields
      sessions {
        ...session_fields
      }  
    }
  }
}

query GetURS(
  $userLabel: EmailAddress!, 
  $robotLabel: String!, 
  $sessionLabel: String!
) {
  users (where: {label: $userLabel}) {
    ...user_fields
    robots (where: {label: $robotLabel}) {
      ...robot_fields
      sessions (where: {label: $sessionLabel}) {
        ...session_fields
      }  
    }
  }
}