fragment robot_fields on Robot {
  id
  label
  _version
  createdTimestamp
  lastUpdatedTimestamp
}

mutation AddRobot(
  $userId: ID!
  $robotLabel: String!
  $version: String!
  $userLabel: String!
) {
  addRobots(
    input: {
      label: $robotLabel
      userLabel: $userLabel
      _version: $version
      user: { connect: { where: { node: { id: $userId } } } }
    }
  ) {
    robots {
      ...robot_fields
    }
  }
}
